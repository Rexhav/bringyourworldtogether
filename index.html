<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Showcase</title>
    <!-- Stable Tailwind CSS v3 Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Sleek dark backup background */
        }
        /* Custom smooth scrollbar for mobile */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen w-full flex items-center justify-center p-3 sm:p-6 relative overflow-x-hidden antialiased">

    <!-- Premium Dynamic Blur Background (Uses your image to create matching ambient lighting) -->
    <div class="absolute inset-0 w-full h-full bg-cover bg-center scale-110 blur-2xl opacity-40 pointer-events-none" 
         style="background-image: url('img.png');">
    </div>
    
    <!-- Dark overlay to ensure crisp contrast -->
    <div class="absolute inset-0 w-full h-full bg-slate-950/50 pointer-events-none"></div>

    <!-- Main Mobile-Optimized Container -->
    <main class="w-full max-w-md bg-white/5 backdrop-blur-md rounded-3xl p-3 border border-white/10 shadow-2xl relative z-10 flex flex-col items-center justify-center transition-all duration-300">
        
        <!-- Interactive Image Frame: Preserves native aspect ratio and resolution -->
        <div class="w-full rounded-2xl overflow-hidden bg-black/20 flex items-center justify-center shadow-inner group">
            <img 
                src="img.png" 
                alt="Event Showcase" 
                class="w-full h-auto max-h-[82vh] object-contain select-none pointer-events-auto rounded-2xl transition-transform duration-300 active:scale-[1.02]"
                loading="eager"
            />
        </div>

        <!-- Sleek Quick Hint for Mobile Users -->
        <p class="text-white/40 text-[11px] font-medium tracking-wide mt-3 text-center uppercase font-sans">
            <i class="fa-solid fa-expand mr-1 text-white/20"></i> Pinch or double-tap to zoom image
        </p>
        
    </main>

</body>
</html>
